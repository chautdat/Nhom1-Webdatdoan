
server.port=3000
server.servlet.context-path=/
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always

spring.application.name=nhom1ck.webdatdoan Restaurant Backend API

spring.datasource.url=jdbc:mysql://localhost:3306/nhom1ck.webdatdoan_restaurant?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.datatype.datetime.write-dates-as-timestamps=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.resolve-lazily=false
spring.servlet.multipart.file-size-threshold=2MB

app.jwt.secret=UERRUmVzdGF1cmFudFNlY3JldEtleUZvcEpXVFRva2VuR2VuZXJhdGlvbjIwMjRWZXJ5TG9uZ0FuZFNlY3VyZUtleTEyMzQ1Njc4OQ==
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

app.frontend-url=${FRONTEND_URL:http://localhost:8080}
app.name=nhom1ck.webdatdoan Restaurant Management System
app.version=1.0.0
app.description=Complete Restaurant Management Backend API
app.upload-dir=uploads

file.upload-dir=uploads

cors.allowed-origins=http://localhost:8080,http://127.0.0.1:8080
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

logging.level.root=INFO
logging.level.com.nhom1ck.webdatdoan=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.io.jsonwebtoken=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/nhom1ck.webdatdoan-backend.log

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
